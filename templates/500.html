{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — Erro interno | Rede Confiança</title>
  <link rel="icon" type="image/png" href="{% static 'images/logo3.png' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF6B35',
            vivo: '#660099',
            'vivo-dark': '#4B0082',
            danger: '#E74C3C',
          },
          fontFamily: { sans: ['Montserrat', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .glitch {
      background: linear-gradient(135deg, #660099 0%, #E74C3C 50%, #FF6B35 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .pulse-bg {
      background: radial-gradient(circle at top right, rgba(231, 76, 60, 0.12), transparent 50%),
                  radial-gradient(circle at bottom left, rgba(102, 0, 153, 0.15), transparent 50%),
                  #ffffff;
    }
    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-4deg); }
      75% { transform: rotate(4deg); }
    }
    .shake { animation: shake 3s ease-in-out infinite; transform-origin: center; }
  </style>
</head>
<body class="min-h-screen pulse-bg flex flex-col items-center justify-center px-4">

  <div class="absolute top-6 left-6 flex items-center gap-3">
    <img src="{% static 'images/logo3.png' %}" alt="Rede Confiança" class="h-10">
  </div>

  <div class="absolute top-6 right-6 flex items-center gap-2 px-3 py-1.5 rounded-full bg-vivo/10 border border-vivo/20">
    <span class="w-2 h-2 rounded-full bg-vivo animate-pulse"></span>
    <span class="text-xs font-semibold text-vivo">Vivo · Rede Confiança</span>
  </div>

  <div class="max-w-2xl w-full text-center">
    <div class="shake mb-6">
      <i class="fas fa-triangle-exclamation text-7xl md:text-8xl text-danger opacity-80"></i>
    </div>

    <h1 class="text-8xl md:text-9xl font-extrabold glitch leading-none">500</h1>

    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mt-4">
      Algo deu errado no servidor
    </h2>

    <p class="text-gray-600 mt-3 text-base md:text-lg">
      Identificamos uma instabilidade momentânea. Nossa equipe já foi notificada.
      Tente novamente em instantes.
    </p>

    <div class="mt-4 inline-flex items-center gap-2 bg-white/70 backdrop-blur border border-red-200 rounded-lg px-4 py-2 text-xs text-red-700 font-semibold">
      <i class="fas fa-server"></i> Erro interno do servidor
    </div>

    <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
      <a href="javascript:location.reload()" class="px-6 py-3 rounded-lg bg-gradient-to-r from-vivo to-vivo-dark text-white font-semibold shadow-lg hover:shadow-xl hover:scale-105 transition-all">
        <i class="fas fa-rotate-right"></i> Tentar novamente
      </a>
      <a href="/" class="px-6 py-3 rounded-lg bg-white border-2 border-primary text-primary font-semibold hover:bg-primary hover:text-white transition-all">
        <i class="fas fa-house"></i> Ir para o início
      </a>
    </div>

    <div class="mt-12 flex items-center justify-center gap-4 text-xs text-gray-400">
      <span class="flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-vivo"></span> Vivo</span>
      <span class="text-gray-300">|</span>
      <span class="flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-primary"></span> Rede Confiança</span>
    </div>
  </div>

</body>
</html>
