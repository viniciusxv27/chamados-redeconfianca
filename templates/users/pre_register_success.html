{% load static %}<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Concluído - Rede Confiança</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo3.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#FF6B35' } } } };</script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-sm p-8 text-center">
        <img src="{% static 'images/logo3.png' %}" alt="Rede Confiança" class="h-12 mx-auto mb-5">
        <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-check text-green-600 text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Cadastro concluído!</h1>
        <p class="text-gray-600 mb-6">Seus dados e documentos foram enviados com sucesso. Sua conta já está ativa — você pode acessar o portal com seu e-mail e a senha que definiu.</p>
        <a href="{% url 'login' %}" class="inline-flex items-center justify-center w-full bg-primary text-white py-3 rounded-lg hover:bg-orange-600 transition-colors font-medium">
            <i class="fas fa-sign-in-alt mr-2"></i> Acessar o portal
        </a>
    </div>
</body>
</html>
