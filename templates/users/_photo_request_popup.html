{% load static %}
{% if user.is_authenticated and not user.profile_picture %}
<!-- Popup: solicitação de foto de perfil (último a aparecer na Home) -->
<div id="photo-request-modal"
     class="rc-modal hidden fixed inset-0 z-[10001] bg-black/50 flex items-center justify-center p-4">
  <div class="rc-modal-card bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden">
    <div class="bg-gradient-to-r from-orange-500 to-amber-500 px-6 py-5 text-white text-center relative">
      <button type="button" id="photo-request-close"
              class="absolute top-3 right-4 text-white/80 hover:text-white text-2xl leading-none">&times;</button>
      <i class="fas fa-camera text-3xl mb-2"></i>
      <h3 class="text-lg font-bold leading-tight">Adicione sua foto de perfil</h3>
    </div>
    <div class="px-6 py-5">
      <p class="text-sm text-gray-600 mb-5 text-center">
        Deixe seu perfil mais completo! Uma foto ajuda seus colegas a te reconhecerem no portal.
      </p>
      <form id="photo-request-form" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="flex flex-col items-center gap-4">
          <div id="photo-request-preview-wrap"
               class="w-28 h-28 rounded-full overflow-hidden bg-gray-100 flex items-center justify-center ring-4 ring-orange-100 relative">
            <span id="photo-request-placeholder" class="text-4xl text-gray-300"><i class="fas fa-user"></i></span>
            <img id="photo-request-preview" class="w-full h-full object-cover hidden" alt="Prévia da foto">
            <div id="photo-request-uploading"
                 class="rc-skeleton hidden absolute inset-0 flex items-center justify-center">
              <i class="fas fa-spinner fa-spin text-orange-500 text-xl relative z-10"></i>
            </div>
          </div>
          <label for="photo-request-input"
                 class="cursor-pointer inline-flex items-center gap-2 px-4 py-2 bg-orange-50 text-orange-700 border border-orange-200 rounded-lg text-sm font-semibold hover:bg-orange-100 transition-colors">
            <i class="fas fa-image"></i> Escolher foto
          </label>
          <input type="file" id="photo-request-input" name="profile_picture" accept="image/*" class="hidden">
          <p id="photo-request-error" class="text-xs text-red-600 text-center hidden"></p>
        </div>
      </form>
    </div>
    <div class="px-6 py-4 bg-gray-50 flex items-center justify-between gap-3">
      <button type="button" id="photo-request-later"
              class="px-4 py-2 text-gray-500 hover:text-gray-700 text-sm">Agora não</button>
      <button type="button" id="photo-request-submit" disabled
              class="px-5 py-2.5 bg-primary text-white rounded-lg hover:bg-orange-600 transition-colors text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed inline-flex items-center gap-2">
        <span id="photo-request-spinner" class="hidden"><i class="fas fa-spinner fa-spin"></i></span>
        <span id="photo-request-submit-label">Salvar foto</span>
      </button>
    </div>
  </div>
</div>

<script>
(function () {
  if (window.__photoRequestInit) return;
  window.__photoRequestInit = true;

  var modal = document.getElementById('photo-request-modal');
  if (!modal) return;

  var SESSION_KEY = 'rc_photo_request_shown';
  // Só aparece depois que TODOS os outros popups da home tiverem aparecido/fechado.
  var OTHERS = [
    '#experience-window-modal',
    '#mandatory-trails-modal',
    '#feedback-reminder-modal',
    '#portal-popup-modal',
    '#pickupAlertModal'
  ];

  var input = document.getElementById('photo-request-input');
  var preview = document.getElementById('photo-request-preview');
  var placeholder = document.getElementById('photo-request-placeholder');
  var uploading = document.getElementById('photo-request-uploading');
  var submitBtn = document.getElementById('photo-request-submit');
  var submitLabel = document.getElementById('photo-request-submit-label');
  var spinner = document.getElementById('photo-request-spinner');
  var errorEl = document.getElementById('photo-request-error');
  var laterBtn = document.getElementById('photo-request-later');
  var closeBtn = document.getElementById('photo-request-close');

  function csrfToken() {
    var el = modal.querySelector('[name=csrfmiddlewaretoken]');
    if (el && el.value) return el.value;
    var m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? m[1] : '';
  }

  function anyOtherVisible() {
    return OTHERS.some(function (sel) {
      var el = document.querySelector(sel);
      return el && !el.classList.contains('hidden');
    });
  }

  function openModal() {
    modal.classList.remove('hidden');
    requestAnimationFrame(function () { modal.classList.add('is-open'); });
  }
  function closeModal() {
    modal.classList.remove('is-open');
    setTimeout(function () { modal.classList.add('hidden'); }, 300);
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.remove('hidden');
  }
  function clearError() {
    errorEl.textContent = '';
    errorEl.classList.add('hidden');
  }

  // --- Seleção da foto + prévia ---
  input.addEventListener('change', function () {
    clearError();
    var file = input.files && input.files[0];
    if (!file) return;
    if (!file.type || file.type.indexOf('image/') !== 0) {
      showError('Selecione um arquivo de imagem.');
      input.value = '';
      return;
    }
    if (file.size > 8 * 1024 * 1024) {
      showError('A imagem deve ter no máximo 8 MB.');
      input.value = '';
      return;
    }
    var reader = new FileReader();
    reader.onload = function (e) {
      preview.src = e.target.result;
      preview.classList.remove('hidden');
      placeholder.classList.add('hidden');
      submitBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  });

  // --- Envio ---
  function submit() {
    var file = input.files && input.files[0];
    if (!file) return;
    clearError();
    submitBtn.disabled = true;
    spinner.classList.remove('hidden');
    submitLabel.textContent = 'Enviando...';
    uploading.classList.remove('hidden');

    var fd = new FormData();
    fd.append('profile_picture', file);

    fetch('{% url "upload_profile_photo" %}', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'X-CSRFToken': csrfToken() },
      body: fd
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
      .then(function (res) {
        if (res.ok && res.data.success) {
          submitLabel.textContent = 'Foto salva!';
          spinner.classList.add('hidden');
          // Recarrega para refletir a nova foto em toda a interface (sidebar, home...).
          setTimeout(function () { window.location.reload(); }, 700);
        } else {
          throw new Error((res.data && res.data.error) || 'Não foi possível salvar a foto.');
        }
      })
      .catch(function (err) {
        uploading.classList.add('hidden');
        spinner.classList.add('hidden');
        submitLabel.textContent = 'Salvar foto';
        submitBtn.disabled = false;
        showError(err.message || 'Erro ao enviar a foto. Tente novamente.');
      });
  }

  submitBtn.addEventListener('click', submit);
  if (laterBtn) laterBtn.addEventListener('click', closeModal);
  if (closeBtn) closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', function (e) { if (e.target === modal) closeModal(); });

  // --- Agendamento: aparece por último ---
  function start() {
    if (sessionStorage.getItem(SESSION_KEY)) return;
    var startedAt = performance.now();
    var iv = setInterval(function () {
      var elapsed = performance.now() - startedAt;
      // Espera ~3s (tempo para os demais popups — inclusive o de retirada — abrirem)
      // e só então, quando nenhum outro estiver visível, exibe.
      if (elapsed < 3000) return;
      if (anyOtherVisible()) return;
      clearInterval(iv);
      sessionStorage.setItem(SESSION_KEY, '1');
      openModal();
    }, 250);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
{% endif %}
