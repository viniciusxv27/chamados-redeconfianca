{% extends "base.html" %}
{% block title %}Atribuir Feedback{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-50 p-4 sm:p-6 lg:p-8">
  <div class="max-w-3xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-user-plus mr-2 text-indigo-500"></i>Atribuir Feedback</h1>
      <a href="{% url 'feedback:manage' %}" class="px-3 py-2 bg-white border rounded-lg text-sm">Voltar</a>
    </div>

    <form method="post" class="bg-white rounded-xl shadow p-6 space-y-5">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Avaliador (quem dará o feedback)</label>
        <input id="evaluator-search" type="text" placeholder="Buscar usuário..." class="w-full px-4 py-2 border rounded-lg" />
        <div id="evaluator-results" class="mt-2 max-h-40 overflow-auto border rounded hidden"></div>
        <div id="evaluator-selected" class="mt-2"></div>
        <input type="hidden" name="evaluator" id="evaluator-id" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Avaliados (uma pessoa pode avaliar vários)</label>
        <input id="evaluatees-search" type="text" placeholder="Buscar usuário..." class="w-full px-4 py-2 border rounded-lg" />
        <div id="evaluatees-results" class="mt-2 max-h-40 overflow-auto border rounded hidden"></div>
        <div id="evaluatees-selected" class="mt-2 flex flex-wrap gap-2"></div>
        <input type="hidden" name="evaluatees" id="evaluatees-ids" />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Prazo</label>
          <input type="date" name="due_date" class="w-full px-4 py-2 border rounded-lg" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Observações</label>
        <textarea name="notes" rows="2" class="w-full px-4 py-2 border rounded-lg"></textarea>
      </div>

      <div class="flex justify-end">
        <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Atribuir</button>
      </div>
    </form>
  </div>
</div>

<script>
const apiUrl = '{% url "feedback:api_search_users" %}';
function setupSearch(prefix, multi) {
  const inp = document.getElementById(prefix + '-search');
  const out = document.getElementById(prefix + '-results');
  const sel = document.getElementById(prefix + '-selected');
  const idField = document.getElementById(prefix + (multi ? '-ids' : '-id'));
  const selected = new Map();
  let t;
  inp.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(async () => {
      if (!inp.value.trim()) { out.classList.add('hidden'); return; }
      const r = await fetch(apiUrl + '?q=' + encodeURIComponent(inp.value));
      const d = await r.json();
      out.innerHTML = d.results.map(u => `<div class="p-2 hover:bg-gray-50 cursor-pointer" data-id="${u.id}" data-name="${u.name}">${u.name} <span class="text-xs text-gray-500">${u.email}</span></div>`).join('');
      out.classList.remove('hidden');
      out.querySelectorAll('div[data-id]').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.id, name = el.dataset.name;
          if (multi) {
            if (!selected.has(id)) selected.set(id, name);
          } else {
            selected.clear(); selected.set(id, name);
          }
          render();
          inp.value = ''; out.classList.add('hidden');
        });
      });
    }, 250);
  });
  function render() {
    sel.innerHTML = '';
    selected.forEach((name, id) => {
      const chip = document.createElement('span');
      chip.className = 'inline-flex items-center gap-1 px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm';
      chip.innerHTML = `${name} <button type="button" data-id="${id}" class="text-indigo-600 hover:text-red-600">&times;</button>`;
      chip.querySelector('button').addEventListener('click', () => { selected.delete(id); render(); });
      sel.appendChild(chip);
    });
    idField.value = multi ? Array.from(selected.keys()).join(',') : (selected.size ? Array.from(selected.keys())[0] : '');
  }
}
setupSearch('evaluator', false);
setupSearch('evaluatees', true);
</script>
{% endblock %}
