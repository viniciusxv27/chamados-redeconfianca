{% extends 'base.html' %}

{% block title %}{{ report.name }} - Power BI{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 sm:p-6 mb-4">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">{{ report.name }}</h1>
                <p class="text-sm text-gray-600 mt-1">{{ report.description|default:'Dashboard corporativo Power BI' }}</p>
            </div>
            <a href="{% url 'power_bi:list' %}" class="inline-flex items-center bg-gray-100 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>
                Voltar
            </a>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <iframe
            title="{{ report.name }}"
            src="{{ report.embed_url }}"
            class="w-full"
            style="height: 78vh; min-height: 560px; border: 0;"
            allowfullscreen="true">
        </iframe>
    </div>
</div>
{% endblock %}
