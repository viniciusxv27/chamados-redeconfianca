{# Seletor visual de ícones. A grade é preenchida por JS (initIconPickers). #}
<div class="icon-picker">
    <input type="hidden" name="icon" value="{{ value|default:'fa-file-contract' }}" class="icon-picker-value">
    <div class="flex items-center gap-2 mb-2">
        <span class="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center flex-shrink-0">
            <i class="icon-preview fas {{ value|default:'fa-file-contract' }} text-green-600"></i>
        </span>
        <span class="icon-name text-xs text-gray-400 font-mono"></span>
    </div>
    <div class="icon-grid grid grid-cols-6 sm:grid-cols-8 gap-1 max-h-32 overflow-y-auto p-1.5 bg-gray-50 rounded-md border border-gray-200"></div>
</div>
