{% comment %}Badge de status reutilizável. Recebe `status` e `label`.{% endcomment %}
{% if status == 'PENDENTE' %}
<span class="inline-flex px-2 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">{{ label }}</span>
{% elif status == 'APROVADO' %}
<span class="inline-flex px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">{{ label }}</span>
{% elif status == 'REPROVADO' %}
<span class="inline-flex px-2 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800">{{ label }}</span>
{% elif status == 'ENTREGUE' %}
<span class="inline-flex px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">{{ label }}</span>
{% else %}
<span class="inline-flex px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600">{{ label }}</span>
{% endif %}
