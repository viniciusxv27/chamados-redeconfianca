{% extends "base.html" %}
{% load static %}

{% block title %}Editar Módulo - {{ module.title }}{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50 p-6">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-purple-600 to-pink-600 text-white p-6 flex items-center justify-between">
                <h2 class="text-2xl font-bold">
                    <i class="fas fa-pen mr-2"></i>Editar Módulo
                </h2>
                <a href="{% url 'knowledge_trails:edit_trail' trail.id %}" class="px-4 py-2 bg-white bg-opacity-20 rounded-xl hover:bg-opacity-30 transition-all">
                    <i class="fas fa-arrow-left mr-1"></i>Voltar
                </a>
            </div>

            <form method="post" enctype="multipart/form-data" class="p-6 space-y-5">
                {% csrf_token %}

                <div>
                    <label for="title" class="block text-sm font-semibold text-gray-700 mb-2">Título</label>
                    <input id="title" name="title" type="text" value="{{ module.title }}" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none transition-all">
                </div>

                <div>
                    <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">Descrição</label>
                    <textarea id="description" name="description" rows="4" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none transition-all">{{ module.description }}</textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label for="icon_emoji" class="block text-sm font-semibold text-gray-700 mb-2">Emoji</label>
                        <input id="icon_emoji" name="icon_emoji" type="text" value="{{ module.icon_emoji }}" maxlength="10" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none transition-all text-center text-2xl">
                    </div>

                    <div>
                        <label for="logo_image" class="block text-sm font-semibold text-gray-700 mb-2">Logo (Imagem)</label>
                        <input id="logo_image" name="logo_image" type="file" accept="image/*" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none transition-all">
                        {% if module.logo_image %}
                        <div class="mt-2 flex items-center gap-3">
                            <img src="{{ module.logo_image.url }}" alt="Logo atual" class="w-9 h-9 rounded-lg object-cover border border-gray-200">
                            <label class="text-sm text-gray-700 flex items-center">
                                <input type="checkbox" name="remove_logo_image" class="mr-2">Remover imagem
                            </label>
                        </div>
                        {% endif %}
                    </div>

                    <div>
                        <label for="order" class="block text-sm font-semibold text-gray-700 mb-2">Ordem</label>
                        <input id="order" name="order" type="number" min="0" value="{{ module.order }}" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none transition-all">
                    </div>
                </div>

                <label class="flex items-center text-gray-700">
                    <input type="checkbox" name="is_active" {% if module.is_active %}checked{% endif %} class="mr-2">
                    Módulo ativo
                </label>

                <div class="pt-4 border-t border-gray-200 flex justify-end gap-3">
                    <a href="{% url 'knowledge_trails:edit_trail' trail.id %}" class="px-5 py-3 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition-all">Cancelar</a>
                    <button type="submit" class="px-5 py-3 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition-all">
                        <i class="fas fa-save mr-1"></i>Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
